<tr id="field-{{ field.id }}">
    <td>{{ field.key }}</td>
    <td>{{ field.original_value }}</td>
    <td>
        <input type="text"
            name="corrected_value"
            value="{{ field.corrected_value|default:'' }}"
            autofocus
            style="margin: 0; padding: 0.25em 0.5em;">
    </td>
    <td>{{ field.data_type }}</td>
    <td>
        {% if field.confidence %}
        {{ field.confidence|floatformat:2 }}
        {% else %}
        —
        {% endif %}
    </td>
    <td>
        <button hx-post="{% url 'field-correct' field.id %}"
            hx-target="#field-{{ field.id }}"
            hx-swap="outerHTML"
            hx-include="closest tr"
            style="padding: 0.25em 0.75em; font-size: 0.85em;"
        >
            Save
        </button>
        <button hx-get="{% url 'field-row' field.id %}"
            hx-target="#field-{{ field.id }}"
            hx-swap="outerHTML"
            class="outline secondary"
            style="padding: 0.25em 0.75em; font-size: 0.85em;"
        >
            Cancel
        </button>
    </td>
</tr>
