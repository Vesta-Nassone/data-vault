<table>
    <thead>
        <tr>
            <th>Form Type</th>
            <th>Filename</th>
            <th>Status</th>
            <th>Fields</th>
            <th>Uploaded</th>
            <th></th>
        </tr>
    </thead>
    <tbody>
        {% for doc in documents %}
        <tr>
            <td>{{ doc.form_type }}</td>
            <td>{{ doc.original_filename }}</td>
            <td><span class="badge badge-{{ doc.status }}">{{ doc.status }}</span></td>
            <td>{{ doc.fields.count }}</td>
            <td>{{ doc.uploaded_at|date:"Y-m-d H:i" }}</td>
            <td><a href="{% url 'document-detail' doc.id %}">View</a></td>
        </tr>
        {% empty %}
        <tr><td colspan="6" style="text-align: center; color: #aaa;">No documents found.</td></tr>
        {% endfor %}
    </tbody>
</table>
